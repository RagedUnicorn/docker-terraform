# Docker Compose configuration for running Container Structure Tests
#
# Usage:
#   docker compose -f docker-compose.test.yml up
#   docker compose -f docker-compose.test.yml run test-all
#
# This will validate the Terraform Docker image structure, commands, and metadata

services:
  # Test file existence and permissions
  container-test:
    image: ragedunicorn/container-test:${CONTAINER_STRUCTURE_TEST_VERSION:-latest}
    volumes:
      - ./test/:/test:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--image", "ragedunicorn/terraform:${TERRAFORM_VERSION:-test}", "--config", "/test/terraform_test.yml"]
    labels:
      org.opencontainers.image.title: "Container Structure Test - File Tests"
      org.opencontainers.image.description: "Validating Terraform file structure and permissions"
      org.opencontainers.image.vendor: "ragedunicorn"

  # Test image metadata and labels
  container-test-metadata:
    image: ragedunicorn/container-test:${CONTAINER_STRUCTURE_TEST_VERSION:-latest}
    volumes:
      - ./test/:/test:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--image", "ragedunicorn/terraform:${TERRAFORM_VERSION:-test}", "--config", "/test/terraform_metadata_test.yml"]
    labels:
      org.opencontainers.image.title: "Container Structure Test - Metadata Tests"
      org.opencontainers.image.description: "Validating Terraform image metadata and OCI labels"
      org.opencontainers.image.vendor: "ragedunicorn"

  # Test command execution
  container-test-command:
    image: ragedunicorn/container-test:${CONTAINER_STRUCTURE_TEST_VERSION:-latest}
    volumes:
      - ./test/:/test:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--image", "ragedunicorn/terraform:${TERRAFORM_VERSION:-test}", "--config", "/test/terraform_command_test.yml"]
    labels:
      org.opencontainers.image.title: "Container Structure Test - Command Tests"
      org.opencontainers.image.description: "Validating Terraform command execution"
      org.opencontainers.image.vendor: "ragedunicorn"

  # Run all tests sequentially
  test-all:
    image: ragedunicorn/container-test:${CONTAINER_STRUCTURE_TEST_VERSION:-latest}
    volumes:
      - ./test/:/test:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command: >
      -c "echo 'Running all Container Structure Tests for Terraform...' &&
          container-structure-test test --image ragedunicorn/terraform:${TERRAFORM_VERSION:-test} --config /test/terraform_test.yml &&
          echo '✓ File structure tests passed' &&
          container-structure-test test --image ragedunicorn/terraform:${TERRAFORM_VERSION:-test} --config /test/terraform_command_test.yml &&
          echo '✓ Command execution tests passed' &&
          container-structure-test test --image ragedunicorn/terraform:${TERRAFORM_VERSION:-test} --config /test/terraform_metadata_test.yml &&
          echo '✓ Metadata validation tests passed' &&
          echo && echo '✅ All Terraform container tests completed successfully!'"
